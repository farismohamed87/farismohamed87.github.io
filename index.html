<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio Faris Mohamed</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .profile-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
        }

        .avatar {
            width: 96px;
            height: 96px;
            background: linear-border-gradient;
            background: rgb(56, 189, 248);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 32px;
            font-weight: bold;
            color: #0f172a;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .role {
            font-size: 16px;
            color: #38bdf8;
            font-weight: 500;
            margin-bottom: 24px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .section-title {
            font-size: 14px;
            text-align: left;
            color: #94a3b8;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .skills-container {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 28px;
        }

        .skill-badge {
            background-color: #2e3e56;
            color: #e2e8f0;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #475569;
        }

        .fun-fact {
            background-color: #0f172a;
            border-left: 4px solid #38bdf8;
            padding: 12px 16px;
            border-radius: 0 8px 8px 0;
            text-align: left;
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="avatar">F</div>
        <h1>Faris</h1>
        <div class="role">Network Rookie</div>
        
        <div class="section-title">Kemahiran</div>
        <div class="skills-container">
            <span class="skill-badge">Cisco (CCNA/CCDA)</span>
            <span class="skill-badge">FortiGate (NSE4)</span>
            <span class="skill-badge">Linux (Ubuntu)</span>
            <span class="skill-badge">Proxmox VE</span>
            <span class="skill-badge">Docker</span>
            <span class="skill-badge">Git & SSH</span>
            <span class="skill-badge">Prometheus & Grafana</span>
        </div>

        <div class="section-title">Fakta Menarik</div>
        <div class="fun-fact">
            Suka meluangkan masa lapang membina dan menguji infrastruktur keselamatan rangkaian berkonsepkan Zero-Trust di dalam makmal maya sendiri.
        </div>
    </div>

</body>
</html>
