<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio - Faris Mohamed</title>
<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body{
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background:#0f172a;
        color:#e2e8f0;
        padding:20px;
    }

    .card{
        width:100%;
        max-width:420px;
        background:#1e293b;
        border:1px solid #334155;
        border-radius:20px;
        padding:32px;
        text-align:center;
        box-shadow:0 10px 30px rgba(0,0,0,0.4);
    }

    .avatar{
        width:100px;
        height:100px;
        margin:0 auto 20px;
        border-radius:50%;
        background:linear-gradient(135deg,#38bdf8,#6366f1);
        display:flex;
        align-items:center;
        justify-content:center;
        font-size:2rem;
        font-weight:bold;
        color:white;
    }

    h1{
        font-size:1.8rem;
        margin-bottom:8px;
    }

    .role{
        color:#94a3b8;
        margin-bottom:24px;
    }

    .section{
        text-align:left;
        margin-top:20px;
    }

    .section h2{
        font-size:1rem;
        color:#38bdf8;
        margin-bottom:10px;
    }

    .skills{
        display:flex;
        flex-wrap:wrap;
        gap:10px;
    }

    .skill{
        background:#334155;
        padding:8px 12px;
        border-radius:999px;
        font-size:0.9rem;
    }

    .fact{
        color:#cbd5e1;
        line-height:1.6;
    }
</style>
</head>
<body>

<div class="card">
    <div class="avatar">FM</div>

    <h1>Faris Mohamed</h1>
    <p class="role">Network Installation Engineer</p>

    <div class="section">
        <h2>Kemahiran</h2>
        <div class="skills">
            <span class="skill">Linux</span>
            <span class="skill">Git</span>
            <span class="skill">Cisco-Fortinet-Juniper</span>
        </div>
    </div>

    <div class="section">
        <h2>Fakta Menarik</h2>
        <p class="fact">
            Saya gemar meneroka teknologi awan dan sentiasa mencari cara untuk mengautomasikan tugasan harian.
        </p>
    </div>
</div>

</body>
</html>
